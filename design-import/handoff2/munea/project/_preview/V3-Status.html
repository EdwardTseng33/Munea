<!-- @dsCard group="V3 靜奢資料" -->
<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"><title>V3-Status</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1E2A26;--card:#26332E;--card2:#2C3B35;--line:#37463F;
--ink:#F4EFE6;--muted:#9DB0A6;--mint:#4FD1B5;--amber:#E9B44C;--coral:#E8825A;--violet:#B3A6F0}
.frame{width:390px;background:var(--bg);border-radius:34px;overflow:hidden;
box-shadow:0 24px 70px rgba(0,0,0,.55);font-family:'Inter','Noto Sans TC',system-ui,sans-serif;color:var(--ink)}
.pad{padding:24px 20px 30px}
.big{font-weight:800;letter-spacing:-1.5px;font-family:'Inter','Noto Sans TC',sans-serif}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 11px;border-radius:999px}
.svg{width:22px;height:22px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav{display:flex;justify-content:space-around;align-items:center;padding:12px 8px 22px;background:#18211D;border-top:1px solid var(--line)}
.nav a{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:700}
.nav a.on{color:var(--mint)}
.nav .fab{width:50px;height:50px;border-radius:18px;background:var(--mint);box-shadow:0 0 24px -2px rgba(79,209,181,.7);margin-top:-16px}
body{background:#111;display:flex;justify-content:center;padding:24px;min-height:100vh}</style></head><body><div class="frame">
<div class="pad">
  <div class="big" style="font-size:30px;margin-bottom:16px">今天的狀態</div>
  <div style="display:flex;gap:8px;margin-bottom:18px">
    <span class="chip" style="background:var(--mint);color:#12211C;font-size:13px;padding:8px 18px">今天</span>
    <span class="chip" style="background:var(--card);color:var(--muted);font-size:13px;padding:8px 18px">本週</span>
    <span class="chip" style="background:var(--card);color:var(--muted);font-size:13px;padding:8px 18px">本月</span></div>
  <!-- 血壓大折線卡（發光）-->
  <div style="background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span style="font-size:13px;font-weight:700;color:var(--muted)">❤ 血壓</span><span class="chip" style="background:rgba(79,209,181,.16);color:var(--mint)">穩定</span></div>
    <div class="big" style="font-size:52px;color:var(--mint);line-height:1">121<span style="font-size:20px;color:var(--muted)">/82</span></div>
    <svg viewBox="0 0 320 70" style="width:100%;height:60px;margin-top:6px"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4FD1B5" stop-opacity=".35"/><stop offset="1" stop-color="#4FD1B5" stop-opacity="0"/></linearGradient></defs>
      <path d="M0,50 45,34 90,42 135,20 180,32 225,14 270,28 320,18 L320,70 L0,70Z" fill="url(#g)"/>
      <polyline points="0,50 45,34 90,42 135,20 180,32 225,14 270,28 320,18" fill="none" stroke="#4FD1B5" stroke-width="3" stroke-linecap="round"/><circle cx="320" cy="18" r="4.5" fill="#4FD1B5"/></svg>
  </div>
  <!-- 睡眠環＋用藥點陣 雙卡 -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
    <div style="background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;text-align:center">
      <span style="font-size:12px;font-weight:700;color:var(--muted);display:block;text-align:left">🌙 睡眠</span>
      <svg viewBox="0 0 90 90" style="width:90px;height:90px;margin:6px auto 0"><circle cx="45" cy="45" r="37" fill="none" stroke="#37463F" stroke-width="8"/><circle cx="45" cy="45" r="37" fill="none" stroke="var(--amber)" stroke-width="8" stroke-linecap="round" stroke-dasharray="232" stroke-dashoffset="52" transform="rotate(-90 45 45)"/><text x="45" y="42" text-anchor="middle" font-size="22" font-weight="800" fill="var(--amber)">7.5</text><text x="45" y="58" text-anchor="middle" font-size="10" fill="#9DB0A6">小時</text></svg>
    </div>
    <div style="background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px">
      <span style="font-size:12px;font-weight:700;color:var(--muted)">💊 用藥</span>
      <div class="big" style="font-size:34px;color:var(--coral);margin:6px 0 12px">2<span style="font-size:16px;color:var(--muted)">/3</span></div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px">
<i style="aspect-ratio:1;border-radius:5px;background:#E8825A"></i><i style="aspect-ratio:1;border-radius:5px;background:#E8825A"></i><i style="aspect-ratio:1;border-radius:5px;background:#E8825A"></i><i style="aspect-ratio:1;border-radius:5px;background:#E8825A"></i><i style="aspect-ratio:1;border-radius:5px;background:rgba(232,130,90,.22)"></i><i style="aspect-ratio:1;border-radius:5px;background:rgba(232,130,90,.22)"></i><i style="aspect-ratio:1;border-radius:5px;background:rgba(232,130,90,.22)"></i><i style="aspect-ratio:1;border-radius:5px;background:rgba(232,130,90,.22)"></i><i style="aspect-ratio:1;border-radius:5px;background:rgba(232,130,90,.22)"></i><i style="aspect-ratio:1;border-radius:5px;background:rgba(232,130,90,.22)"></i>
      </div></div>
  </div>
  <!-- 活動熱力格 -->
  <div style="background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px 20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:13px;font-weight:700;color:var(--muted)">👟 這週活動</span><span class="big" style="font-size:22px;color:var(--mint)">20<span style="font-size:13px;color:var(--muted)">分/今天</span></span></div>
    <div style="display:flex;gap:6px;justify-content:space-between">
<div style="flex:1;text-align:center"><div style="height:20px;border-radius:5px;background:#37463F;margin-bottom:5px"></div><span style="font-size:10px;color:#9DB0A6">一</span></div><div style="flex:1;text-align:center"><div style="height:38px;border-radius:5px;background:#4FD1B5;margin-bottom:5px"></div><span style="font-size:10px;color:#9DB0A6">二</span></div><div style="flex:1;text-align:center"><div style="height:28px;border-radius:5px;background:#3a5c50;margin-bottom:5px"></div><span style="font-size:10px;color:#9DB0A6">三</span></div><div style="flex:1;text-align:center"><div style="height:46px;border-radius:5px;background:#4FD1B5;margin-bottom:5px"></div><span style="font-size:10px;color:#9DB0A6">四</span></div><div style="flex:1;text-align:center"><div style="height:52px;border-radius:5px;background:#4FD1B5;margin-bottom:5px"></div><span style="font-size:10px;color:#9DB0A6">五</span></div><div style="flex:1;text-align:center"><div style="height:16px;border-radius:5px;background:#37463F;margin-bottom:5px"></div><span style="font-size:10px;color:#9DB0A6">六</span></div><div style="flex:1;text-align:center"><div style="height:30px;border-radius:5px;background:rgba(79,209,181,.5);margin-bottom:5px"></div><span style="font-size:10px;color:#9DB0A6">日</span></div>
    </div>
  </div>
</div>

<div class="nav"><a><svg class="svg" viewBox="0 0 24 24"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/></svg>首頁</a>
<a class="on"><svg class="svg" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>狀態</a>
<a><span class="fab" style="display:grid;place-items:center"><svg class="svg" style="stroke:#12211C" viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg></span><span style="margin-top:2px">聊聊</span></a>
<a><svg class="svg" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8"/></svg>家人</a>
<a><svg class="svg" viewBox="0 0 24 24"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg>設定</a></div>
</div></body></html>
