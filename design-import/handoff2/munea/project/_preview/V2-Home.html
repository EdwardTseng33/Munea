<!-- @dsCard group="V2 編輯暖彩" -->
<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"><title>V2-Home</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#F6F1E7;--ink:#2E2A24;--muted:#8B8578;--line:#EEE7DA;
--sage:#7E8B4F;--coral:#E8703A;--lav:#9B8FE8;--gold:#E6B34A;--cocoa:#6B4E3D;--sky:#5AA9C9}
.frame{width:390px;background:var(--cream);border-radius:34px;overflow:hidden;
box-shadow:0 24px 70px rgba(0,0,0,.4);font-family:'Poppins','Noto Sans TC',system-ui,sans-serif;color:var(--ink)}
.pad{padding:24px 20px 30px}
.disp{font-family:'Poppins','Noto Sans TC',sans-serif;font-weight:800;letter-spacing:-.5px;line-height:1.05}
.big{font-weight:800;letter-spacing:-1px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 11px;border-radius:999px}
.svg{width:22px;height:22px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav{display:flex;justify-content:space-around;align-items:center;padding:12px 8px 22px;background:#fff;box-shadow:0 -4px 20px -12px rgba(0,0,0,.2)}
.nav a{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:700}
.nav a.on{color:var(--coral)}
.nav .d{width:40px;height:32px;border-radius:12px;display:grid;place-items:center}
.nav a.on .d{background:#FBE6DA}
.nav .fab{width:50px;height:50px;border-radius:18px;background:var(--coral);box-shadow:0 10px 22px -6px rgba(232,112,58,.6);margin-top:-16px}
body{background:#2b2b2b;display:flex;justify-content:center;padding:24px;min-height:100vh}</style></head><body><div class="frame">
<div class="pad">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div><div style="font-size:12px;color:var(--muted);font-weight:700">7月6日 週一</div></div>
    <div style="width:42px;height:42px;border-radius:14px;background:var(--cocoa);display:grid;place-items:center;color:#fff;font-size:20px">🌸</div>
  </div>
  <div class="disp" style="font-size:34px;margin-bottom:4px">晚安，</div>
  <div class="disp" style="font-size:34px;color:var(--coral);margin-bottom:22px">早點歇著。</div>
  <!-- 寧寧陪伴卡：可可棕實色 -->
  <div style="background:var(--cocoa);border-radius:26px;padding:20px;color:#fff;margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div><div style="font-size:12px;opacity:.7;font-weight:700">寧寧想說</div>
        <div class="disp" style="font-size:19px;margin-top:2px">睡前聊一下？</div></div>
      <div style="width:44px;height:44px;border-radius:15px;background:rgba(255,255,255,.16);display:grid;place-items:center;font-size:22px">🌸</div></div>
    <div style="font-size:13.5px;opacity:.85;line-height:1.5;margin-bottom:16px">記得你膝蓋前兩天痠，今天有好一點嗎？</div>
    <button style="width:100%;border:none;background:#fff;color:var(--cocoa);font-weight:800;font-size:15px;padding:14px;border-radius:15px">開始聊聊 →</button>
  </div>
  <!-- 概況雙卡：沙綠＋暖金 -->
  <div style="display:grid;grid-template-columns:1.3fr 1fr;gap:12px;margin-bottom:14px">
    <div style="background:var(--sage);border-radius:24px;padding:18px;color:#fff">
      <div style="font-size:12px;opacity:.85;font-weight:700;margin-bottom:8px">今天完成</div>
      <div class="big" style="font-size:44px">1<span style="font-size:22px;opacity:.7">/3</span></div>
      <div style="font-size:12.5px;opacity:.85;margin-top:4px">還有吃藥、散步</div></div>
    <div style="background:var(--gold);border-radius:24px;padding:18px;color:#fff;display:flex;flex-direction:column;justify-content:space-between">
      <div style="font-size:12px;opacity:.9;font-weight:700">連續</div>
      <div class="big" style="font-size:40px;line-height:1">23<span style="font-size:16px;opacity:.8"> 天</span></div>
      <div style="font-size:12px;opacity:.9">準時吃藥 🔥</div></div>
  </div>
  <!-- 家人動態：薰衣草 -->
  <div style="background:var(--lav);border-radius:24px;padding:18px;color:#fff;display:flex;align-items:center;gap:14px">
    <div style="width:46px;height:46px;border-radius:15px;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:22px">🚶</div>
    <div style="flex:1"><div class="disp" style="font-size:16px">外婆揪走路活動</div><div style="font-size:12.5px;opacity:.88;margin-top:2px">還差 5,000 步達標</div></div>
    <div style="font-size:22px">→</div>
  </div>
</div>

<div class="nav"><a class="on"><span class="d"><svg class="svg" viewBox="0 0 24 24"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/></svg></span>首頁</a>
<a><span class="d"><svg class="svg" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></span>狀態</a>
<a><span class="fab" style="display:grid;place-items:center"><svg class="svg" style="stroke:#fff" viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg></span><span style="margin-top:2px">聊聊</span></a>
<a><span class="d"><svg class="svg" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8"/></svg></span>家人</a>
<a><span class="d"><svg class="svg" viewBox="0 0 24 24"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg></span>設定</a></div>
</div></body></html>
