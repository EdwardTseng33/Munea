<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#37A099">
  <title>沐寧 Munea · 營運後台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;800&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/admin.css?v=ops96-1">
</head>
<body>
  <a class="skip-link" href="#pageRoot">跳到主要內容</a>
  <div class="layout">
    <aside class="sidebar" aria-label="營運後台導覽">
      <div class="brand">
        <img class="brand-logo" src="icons/peining-app-icon-source-rounded-transparent-clean-256.png" alt="Munea 沐寧">
        <span class="brand-txt">
          <span class="brand-mark">Mu<b>nea</b><span class="brand-zh">沐寧</span></span>
          <span class="brand-sub">營運後台</span>
        </span>
      </div>
      <nav id="sideNav" aria-label="主要功能"><!-- JS 產生分組選單 --></nav>
      <div class="nav-scroll-hint" id="navScrollHint" aria-hidden="true"></div>
      <div class="user-card">
        <span class="user-ava">沐</span>
        <span class="user-meta">
          <span class="user-name">營運後台</span>
          <span class="user-role" id="envRole">尚未連線</span>
        </span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button type="button" class="topbar-action mobile-nav-btn" id="mobileNavBtn" aria-label="開啟選單" aria-expanded="false" aria-controls="sideNav">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
          </button>
          <div>
            <div class="crumb" id="crumb">營運總覽</div>
            <h1 id="pageTitle">總覽儀表板</h1>
          </div>
        </div>
        <div class="topbar-right">
          <span class="last-updated" id="lastUpdated" role="status" aria-live="polite"></span>
          <button type="button" class="topbar-action icon-btn-mobile" id="refreshBtn" aria-label="重新整理營運資料">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            <span class="btn-txt">重新整理</span>
          </button>
          <button type="button" class="topbar-action secondary icon-btn-mobile" id="logoutBtn" hidden>
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span class="btn-txt">登出</span>
          </button>
        </div>
      </header>

      <div class="content">
        <div id="pageRoot" class="page" tabindex="-1"><!-- JS 依頁面渲染 --></div>
      </div>
    </main>
  </div>

  <div id="mobileNavOverlay" class="mobile-nav-overlay" hidden></div>
  <div id="chartTip" class="chart-tip" role="tooltip" hidden></div>

  <script src="src/version.js?v=ops96-1"></script>
  <script src="src/admin.js?v=ops96-1" defer></script>
</body>
</html>
