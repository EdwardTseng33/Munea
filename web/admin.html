<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#37A099">
  <title>沐寧 Munea · 營運後台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;800&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/admin.css?v=1.17.0">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-logo"><svg viewBox="0 0 24 26" xmlns="http://www.w3.org/2000/svg"><path d="M12 2c5.5 6.2 9 11 9 15.4A9 9 0 0 1 3 17.4C3 13 6.5 8.2 12 2z" fill="#fff"/></svg></span>
        <span class="brand-txt">
          <span class="brand-mark">Munea</span>
          <span class="brand-sub">沐寧 · 營運後台</span>
        </span>
      </div>
      <nav id="sideNav"><!-- JS 產生分組選單 --></nav>
      <div class="user-card">
        <span class="user-ava">沐</span>
        <span class="user-meta">
          <span class="user-name">營運後台</span>
          <span class="user-role" id="envRole">尚未連線</span>
        </span>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div>
          <div class="crumb" id="crumb">營運總覽</div>
          <h1 id="pageTitle">總覽儀表板</h1>
        </div>
        <div class="topbar-right">
          <span class="month-pill">📅 本月 · 7月</span>
          <button id="refreshBtn" type="button">重新整理</button>
          <span class="status-pill" id="statusPill">尚未連線</span>
        </div>
      </header>

      <div class="content">
        <div id="connectBanner" class="connect-banner" hidden>
          <span>🔌 目前顯示的是<b>示範數據</b>，方便你看填滿的樣子。到「連線設定」貼上通行碼，能連的頁面就會換成真資料。</span>
          <button type="button" id="gotoSettings">前往連線設定</button>
        </div>
        <div id="pageRoot" class="page"><!-- JS 依頁面渲染 --></div>
      </div>
    </div>
  </div>

  <div id="chartTip" class="chart-tip" hidden></div>

  <script src="src/version.js?v=1.17.0"></script>
  <script src="src/admin.js?v=1.17.0" defer></script>
</body>
</html>
