<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#37A099">
  <title>沐寧 Munea · 營運後台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;800&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/admin.css?v=1.19.0">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <img class="brand-logo" src="icons/peining-app-icon-source-rounded-transparent-clean-256.png" alt="Munea 沐寧">
        <span class="brand-txt">
          <span class="brand-mark">Mu<b>nea</b><span class="brand-zh">沐寧</span></span>
          <span class="brand-sub">營運後台</span>
        </span>
      </div>
      <nav id="sideNav"><!-- JS 產生分組選單 --></nav>
      <div class="user-card">
        <span class="user-ava">沐</span>
        <span class="user-meta">
          <span class="user-name">營運後台</span>
          <span class="user-role" id="envRole">尚未連線</span>
        </span>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div>
          <div class="crumb" id="crumb">營運總覽</div>
          <h1 id="pageTitle">總覽儀表板</h1>
        </div>
        <div class="topbar-right">
          <span class="month-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>本月 · 7月</span>
        </div>
      </header>

      <div class="content">
        <div id="pageRoot" class="page"><!-- JS 依頁面渲染 --></div>
      </div>
    </div>
  </div>

  <div id="chartTip" class="chart-tip" hidden></div>

  <script src="src/version.js?v=1.19.0"></script>
  <script src="src/admin.js?v=1.19.0" defer></script>
</body>
</html>
