<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>沐寧 Munea · 聊聊體驗版</title>
<style>
  /* ＝App 聊聊畫面複刻（單角色寧寧）＋體驗版倒數＝ */
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:system-ui,"Noto Sans TC",sans-serif;background:#0E1A17;color:#fff;overflow:hidden;-webkit-tap-highlight-color:transparent}
  button{font-family:inherit}
  .screen{position:relative;height:100dvh;width:100%;overflow:hidden;background:#0E1A17}

  .face-bg{position:absolute;inset:0}
  .face-bg img{width:100%;height:100%;object-fit:cover;object-position:center 14%}
  .scrim{position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(to bottom,rgba(4,12,10,.40),rgba(4,12,10,0) 22%,rgba(4,12,10,0) 55%,rgba(4,12,10,.52) 78%,rgba(4,12,10,.84))}

  /* 名字＋在線（App 同款） */
  .face-name{position:absolute;left:18px;top:calc(env(safe-area-inset-top) + 16px);z-index:6;
    display:flex;align-items:center;gap:8px;background:rgba(8,18,15,.5);backdrop-filter:blur(10px);
    padding:8px 14px;border-radius:999px;font-size:16px;font-weight:600}
  .face-name .dot{width:9px;height:9px;border-radius:50%;background:#9aa4a0;flex:none}
  .screen.on .face-name .dot{background:#4ED6C4;box-shadow:0 0 0 0 rgba(78,214,196,.6);animation:live 1.9s infinite}
  @keyframes live{0%{box-shadow:0 0 0 0 rgba(78,214,196,.55)}70%{box-shadow:0 0 0 9px rgba(78,214,196,0)}100%{box-shadow:0 0 0 0 rgba(78,214,196,0)}}
  .face-name .st{font-size:13px;font-weight:600;color:rgba(255,255,255,.75)}

  /* 右上：體驗版標示＋倒數（App 的 hud-pill 樣式） */
  .face-hud{position:absolute;right:18px;top:calc(env(safe-area-inset-top) + 16px);z-index:6;display:flex;gap:8px}
  .hud-pill{background:rgba(8,18,15,.5);backdrop-filter:blur(10px);padding:8px 13px;border-radius:999px;
    font-size:12.5px;font-weight:600;color:rgba(255,255,255,.85);font-variant-numeric:tabular-nums}
  .hud-pill.demo{color:#8FE6D8;letter-spacing:.04em}
  .hud-pill.cnt.low{color:#FFB4A8}

  /* 聲波（App 同款：聽=亮綠、說=深亮綠發光） */
  .face-cue{position:absolute;left:50%;bottom:210px;transform:translateX(-50%);z-index:6}
  .face-wave{display:none;gap:8px}
  .screen[data-state="listening"] .face-wave,.screen[data-state="speaking"] .face-wave{display:inline-flex}
  .face-wave i{display:block;width:5px;height:20px;border-radius:999px;background:#3ED4C2;transform:scaleY(.16);transform-origin:center}
  .screen[data-state="speaking"] .face-wave i{background:#16C4AE;box-shadow:0 0 12px rgba(22,196,174,.95)}

  /* 字幕（App 樣式） */
  .caps{position:absolute;left:16px;right:16px;bottom:calc(128px + env(safe-area-inset-bottom));z-index:6;text-align:center;pointer-events:none}
  .cap-user{display:none;margin:0 auto 8px;max-width:520px;font-size:14.5px;color:rgba(255,255,255,.66);line-height:1.5}
  .cap-user.show{display:block}
  .cap-ai{margin:0 auto;max-width:560px;background:rgba(8,18,15,.58);backdrop-filter:blur(14px);
    border-radius:18px;padding:12px 16px;font-size:17px;line-height:1.6;min-height:22px}
  .caps.capoff{display:none}
  .hint{position:absolute;left:0;right:0;bottom:calc(132px + env(safe-area-inset-bottom));z-index:5;text-align:center;
    font-size:16px;color:#F6ECE2;text-shadow:0 1px 8px rgba(0,0,0,.6);padding:0 24px}

  /* 底部三鍵（App 同款：字幕｜麥克風｜通話） */
  .face-bar{position:absolute;left:0;right:0;bottom:calc(env(safe-area-inset-bottom) + 24px);z-index:7;
    display:flex;justify-content:center;align-items:center;gap:16px}
  .ctl-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;cursor:pointer;
    width:64px;height:58px;border-radius:16px;background:rgba(8,18,15,.55);backdrop-filter:blur(10px);color:#fff;font-size:11.5px}
  .ctl-btn svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .ctl-btn.off{opacity:.45}
  .call-btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border:none;cursor:pointer;
    min-width:168px;height:58px;border-radius:999px;color:#fff;font-size:17px;font-weight:700;
    box-shadow:0 8px 22px rgba(0,0,0,.4);transition:transform .1s;background:#1DA47C}
  .call-btn:active{transform:scale(.96)}
  .call-btn.end{background:#E2544F;min-width:140px}
  .call-btn.end svg{transform:rotate(135deg)}
  .call-btn svg{width:23px;height:23px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:none}

  /* 開場提示（未接通）與結束畫面 */
  .pre{position:absolute;left:0;right:0;bottom:calc(132px + env(safe-area-inset-bottom));z-index:5;text-align:center;padding:0 26px}
  .pre b{display:block;font-size:18px;text-shadow:0 1px 8px rgba(0,0,0,.65)}
  .pre span{display:block;margin-top:7px;font-size:13.5px;color:rgba(255,255,255,.75);text-shadow:0 1px 6px rgba(0,0,0,.6)}
  .screen.on .pre{display:none}

  .over{position:absolute;inset:0;z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(6,14,12,.88);backdrop-filter:blur(10px);text-align:center;padding:0 30px}
  .over.show{display:flex}
  .over h2{font-size:24px;font-weight:800}
  .over p{margin-top:12px;font-size:15.5px;line-height:1.75;color:rgba(255,255,255,.82);max-width:340px}
  .over .again{margin-top:26px;border:none;cursor:pointer;background:#1DA47C;color:#fff;font-size:16px;font-weight:700;
    padding:14px 38px;border-radius:999px}
  .over small{margin-top:16px;font-size:12px;color:rgba(255,255,255,.45)}

  .toast{position:absolute;left:50%;top:calc(env(safe-area-inset-top) + 70px);transform:translateX(-50%);z-index:40;
    background:rgba(226,84,79,.92);color:#fff;padding:10px 18px;border-radius:12px;font-size:14.5px;display:none;max-width:86%;text-align:center}
  .toast.show{display:block}
  @media (min-width:700px){ .screen{max-width:460px;margin:0 auto} body{background:#081210} }
</style>
</head>
<body>

<div class="screen" id="sc" data-state="idle">
  <div class="face-bg"><img src="avatars/nening-real-female-full.jpg" alt="寧寧"></div>
  <div class="scrim"></div>

  <div class="face-name"><span class="dot"></span><span>寧寧</span><span class="st" id="st">未在線</span></div>
  <div class="face-hud">
    <span class="hud-pill demo">體驗版</span>
    <span class="hud-pill cnt" id="cnt" style="display:none">1:00</span>
  </div>

  <div class="face-cue"><div class="face-wave" id="wave"><i></i><i></i><i></i><i></i><i></i></div></div>

  <div class="pre" id="pre">
    <b>點開，就像跟家人視訊</b>
    <span>按下方綠色按鈕，直接開口跟寧寧說話<br>每通體驗 1 分鐘 · 語音與回應由 AI 即時生成</span>
  </div>
  <div class="hint" id="hint"></div>
  <div class="caps" id="caps" style="display:none">
    <div class="cap-user" id="capUser"></div>
    <div class="cap-ai" id="capAi"></div>
  </div>

  <div class="face-bar">
    <button class="ctl-btn" id="capBtn" aria-label="字幕開關">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M10 11h-3v3h3M17 11h-3v3h3"/></svg><span>字幕</span>
    </button>
    <button class="call-btn" id="callBtn" aria-label="開始通話">
      <svg viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 2.9a2 2 0 0 1-.4 2.1L8.1 10a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.9.6 2.9.7a2 2 0 0 1 1.6 2z"/></svg>
      <span id="callLabel">開始通話</span>
    </button>
    <button class="ctl-btn" id="micBtn" aria-label="麥克風開關">
      <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3"/></svg><span>麥克風</span>
    </button>
  </div>

  <div class="over" id="over">
    <h2>🌸 一分鐘體驗結束囉</h2>
    <p>這就是沐寧的「聊聊」——會記得你、有溫度的即時陪伴。<br>App 上架後，寧寧可以天天陪伴家裡的長輩。</p>
    <button class="again" id="again">再體驗一次</button>
    <small>沐寧 Munea · 語音與回應由 AI 即時生成</small>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const sc = $('#sc'), hint = $('#hint'), caps = $('#caps'), capUser = $('#capUser'), capAi = $('#capAi');
const qs = new URLSearchParams(location.search);
const SELFTEST_TEXT = qs.get('text');
window.__demoStats = { ws:0, recv:0, capsAi:'', turns:0, state:'idle', firstAudioMs:null, cutBy:'', err:'' };

function setState(st){ sc.dataset.state = st; window.__demoStats.state = st; }
function setHint(t){ hint.textContent = t || ''; }
function toast(t){ const el=$('#toast'); el.textContent=t; el.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(()=>el.classList.remove('show'),4200); }

/* 倒數（顯示用；真正的斷線由通行碼到期在 Google 端強制） */
let cntIv=null;
function cntStart(sec){
  const el=$('#cnt'); el.style.display='inline-block';
  let left=sec;
  const paint=()=>{ el.textContent=`${(left/60|0)}:${String(left%60).padStart(2,'0')}`;
    el.classList.toggle('low', left<=15); };
  paint();
  cntIv=setInterval(()=>{ left--; paint(); if(left<=0){ clearInterval(cntIv); endDemo('time'); } },1000);
}
function cntStop(){ clearInterval(cntIv); $('#cnt').style.display='none'; }

/* 聲波跟真實音量 */
const bars=[...document.querySelectorAll('.face-wave i')];
let raf=0,lvlSrc=null,cur=0;
function waveStart(get){ lvlSrc=get; if(raf)return;
  const loop=()=>{ const t=Math.max(0,Math.min(1,lvlSrc?(lvlSrc()||0):0)); cur+=(t-cur)*.35;
    bars.forEach((b,i)=>{const shape=1-Math.abs(i-2)/5; b.style.transform=`scaleY(${Math.min(1.7,.3+cur*(0.5+shape)*.9).toFixed(2)})`;});
    raf=requestAnimationFrame(loop); };
  raf=requestAnimationFrame(loop); }
function waveStop(){ cancelAnimationFrame(raf); raf=0; lvlSrc=null; cur=0; bars.forEach(b=>b.style.transform='scaleY(0.16)'); }

function b64FromBuf(buf){ const u8=new Uint8Array(buf); let s=''; for(let i=0;i<u8.length;i+=0x8000) s+=String.fromCharCode.apply(null,u8.subarray(i,Math.min(i+0x8000,u8.length))); return btoa(s); }
function i16FromB64(b64){ const bin=atob(b64); const u8=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i); return new Int16Array(u8.buffer); }

/* 直連 Google（短效通行碼、半雙工、可插話）＝App 聊聊的完整服務 */
const GWS = 'wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContentConstrained';
const Live = {
  ws:null, ac:null, mic:null, proc:null, playCtx:null, playHead:0, on:false, micMuted:false,
  micLevel:0, playLevel:0, speaking:false, _srcs:[], _spkT:null, _ready:false, demoSeconds:60,
  _f2i(f){ const b=new Int16Array(f.length); for(let i=0;i<f.length;i++){const s=Math.max(-1,Math.min(1,f[i])); b[i]=s<0?s*0x8000:s*0x7fff;} return b; },
  _down(buf,inR,outR){ if(outR>=inR)return buf; const r=inR/outR,len=Math.round(buf.length/r),o=new Float32Array(len);
    let i=0,j=0; while(j<len){const n=Math.round((j+1)*r);let s=0,c=0;for(;i<n&&i<buf.length;i++){s+=buf[i];c++;}o[j++]=c?s/c:0;} return o; },
  _toSpeaking(){ if(this.speaking)return; this.speaking=true; setState('speaking'); waveStart(()=>this.playLevel); },
  _toListening(){ clearTimeout(this._spkT); this.speaking=false; this.playLevel=0;
    if(!this.on)return; setState('listening'); waveStart(()=>this.micLevel); },
  async start(){
    let info;
    try{
      const codeQ = qs.get('code') ? '&code='+encodeURIComponent(qs.get('code')) : '';
      const r = await fetch('/api/token?char='+encodeURIComponent('寧寧')+codeQ);
      info = await r.json();
      if(!r.ok || !info.token) throw new Error(info.error||('HTTP '+r.status));
      this.demoSeconds = info.demoSeconds || 60;
    }catch(e){ window.__demoStats.err='token:'+e.message; toast('連不上服務——'+(e.message||'請稍後再試')); return false; }
    this.on = true; this._ready = false;
    try{ this.ws = new WebSocket(GWS+'?access_token='+encodeURIComponent(info.token)); this.ws.binaryType='arraybuffer'; }
    catch(e){ this.on=false; return false; }
    return await new Promise(res=>{
      let done=false; const settle=ok=>{ if(!done){done=true;res(ok);} };
      const td = new TextDecoder();
      this.ws.onopen = ()=>{
        window.__demoStats.ws=1;
        this.ws.send(JSON.stringify({ setup:{
          model: info.model,
          generationConfig:{ responseModalities:['AUDIO'],
            speechConfig:{ voiceConfig:{ prebuiltVoiceConfig:{ voiceName: info.voice } } } },
          systemInstruction:{ parts:[{ text: info.systemInstruction }] },
          outputAudioTranscription:{}, inputAudioTranscription:{},
        }}));
      };
      this.ws.onmessage = async ev=>{
        let msg;
        try{ msg = JSON.parse(typeof ev.data==='string' ? ev.data : td.decode(ev.data)); }catch(e){ return; }
        if(msg.setupComplete){
          this._ready = true;
          this.playCtx = new AudioContext({sampleRate:24000}); this.playHead=this.playCtx.currentTime;
          if (SELFTEST_TEXT){
            this._t0 = performance.now();
            this.ws.send(JSON.stringify({clientContent:{turns:[{role:'user',parts:[{text:SELFTEST_TEXT}]}],turnComplete:true}}));
            this._toListening(); settle(true); return;
          }
          try{ this.mic = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}}); }
          catch(e){ toast('拿不到麥克風——請允許權限後再試一次'); settle(false); this.stop(); return; }
          this.ac = new AudioContext();
          const src=this.ac.createMediaStreamSource(this.mic);
          this.proc=this.ac.createScriptProcessor(4096,1,1);
          src.connect(this.proc); this.proc.connect(this.ac.destination);
          this._t0 = performance.now();
          this.proc.onaudioprocess = e=>{
            const inp=e.inputBuffer.getChannelData(0);
            if(this.speaking||this.micMuted){ this.micLevel=0; return; }
            let s=0; for(let i=0;i<inp.length;i++)s+=inp[i]*inp[i];
            this.micLevel=Math.min(1,Math.sqrt(s/inp.length)*8);
            if(!this.ws||this.ws.readyState!==1||!this._ready)return;
            const buf=this._f2i(this._down(inp,this.ac.sampleRate,16000)).buffer;
            this.ws.send(JSON.stringify({realtimeInput:{audio:{data:b64FromBuf(buf),mimeType:'audio/pcm;rate=16000'}}}));
          };
          this.ws.send(JSON.stringify({clientContent:{turns:[{role:'user',parts:[{text:'（電話接通了）'}]}],turnComplete:true}}));
          this._toListening(); settle(true);
          return;
        }
        const scv = msg.serverContent || {};
        if(scv.interrupted && this.playCtx){
          this._srcs.forEach(s=>{try{s.stop();}catch(e2){}}); this._srcs=[];
          this.playHead=this.playCtx.currentTime; this.playLevel=0;
        }
        const tidy = s=>s.replace(/([一-鿿　-〿，。！？、：；]) +(?=[一-鿿　-〿，。！？、：；])/g,'$1');
        const ot = scv.outputTranscription, it = scv.inputTranscription;
        if(ot && ot.text){ this._cap=tidy((this._cap||'')+ot.text); capAi.textContent=this._cap; window.__demoStats.capsAi=this._cap; caps.style.display='block'; setHint(''); }
        if(it && it.text){ capUser.textContent='你說：'+tidy(it.text); capUser.classList.add('show'); caps.style.display='block'; }
        for(const p of ((scv.modelTurn||{}).parts||[])){
          const d=(p.inlineData||{}).data;
          if(!d || !this.playCtx) continue;
          if(window.__demoStats.firstAudioMs===null&&this._t0) window.__demoStats.firstAudioMs=Math.round(performance.now()-this._t0);
          this._toSpeaking();
          const i16=i16FromB64(d); window.__demoStats.recv+=i16.byteLength;
          const f=new Float32Array(i16.length);
          for(let k=0;k<i16.length;k++)f[k]=i16[k]/0x8000;
          let ps=0; for(let k=0;k<f.length;k++)ps+=f[k]*f[k];
          this.playLevel=Math.min(1,Math.sqrt(ps/f.length)*3.4);
          const b=this.playCtx.createBuffer(1,f.length,24000); b.getChannelData(0).set(f);
          const s=this.playCtx.createBufferSource(); s.buffer=b; s.connect(this.playCtx.destination);
          const now=this.playCtx.currentTime;
          if(this.playHead<now+0.02)this.playHead=now+0.18;
          s.start(this.playHead); this.playHead+=b.duration;
          this._srcs.push(s); s.onended=()=>{const k2=this._srcs.indexOf(s); if(k2>=0)this._srcs.splice(k2,1);};
          clearTimeout(this._spkT); this._spkT=setTimeout(()=>this._toListening(),900);
        }
        if(scv.turnComplete){ window.__demoStats.turns++; this._cap='';
          setTimeout(()=>capUser.classList.remove('show'),1200); }
      };
      this.ws.onclose=()=>{ const was=this.on; settle(false);
        if(was){ endDemo(window.__demoStats.cutBy||'server'); } };  // 通行碼到期＝Google 端硬切
      this.ws.onerror=()=>{ settle(false); };
    });
  },
  stop(){
    this.on=false; this.speaking=false; clearTimeout(this._spkT);
    try{this._srcs.forEach(s=>s.stop());}catch(e){} this._srcs=[];
    try{if(this.proc)this.proc.disconnect();}catch(e){}
    try{if(this.mic)this.mic.getTracks().forEach(t=>t.stop());}catch(e){}
    try{if(this.ws)this.ws.close();}catch(e){}
    try{if(this.ac)this.ac.close();}catch(e){}
    try{if(this.playCtx)this.playCtx.close();}catch(e){}
    this.ws=this.ac=this.mic=this.proc=this.playCtx=null; this.micLevel=this.playLevel=0;
  },
};

/* 通話流＋結束畫面 */
const callBtn=$('#callBtn'), callLabel=$('#callLabel');
let onCall=false;
async function dial(){
  onCall=true;
  callBtn.classList.add('end'); callLabel.textContent='結束通話';
  sc.classList.add('on'); $('#st').textContent='接通中…'; setHint('接通中…');
  caps.style.display='none'; capAi.textContent=''; capUser.textContent='';
  const ok = await Live.start();
  if(!ok){ hangup(); return; }
  $('#st').textContent='在線';
  cntStart(Live.demoSeconds);
  setHint(SELFTEST_TEXT?'':'接通了，直接開口說話吧');
}
function hangup(){
  onCall=false;
  Live.stop(); waveStop(); cntStop();
  setState('idle'); sc.classList.remove('on');
  callBtn.classList.remove('end'); callLabel.textContent='開始通話';
  $('#st').textContent='未在線'; setHint(''); caps.style.display='none';
}
function endDemo(why){
  window.__demoStats.cutBy = why;
  if(!onCall) return;
  hangup();
  $('#over').classList.add('show');
}
callBtn.onclick = ()=> onCall ? (window.__demoStats.cutBy='user', hangup()) : dial();
$('#again').onclick = ()=>{ $('#over').classList.remove('show'); dial(); };
$('#capBtn').onclick = ()=>{ caps.classList.toggle('capoff'); $('#capBtn').classList.toggle('off'); };
$('#micBtn').onclick = ()=>{ Live.micMuted=!Live.micMuted; $('#micBtn').classList.toggle('off',Live.micMuted); };
</script>
</body>
</html>
