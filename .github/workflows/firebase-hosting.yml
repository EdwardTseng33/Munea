name: Deploy public site

on:
  push:
    branches:
      - main
    paths:
      - "app-site/**"
      - ".firebaserc"
      - "firebase.json"
      - "scripts/test-app-site-seo.js"
      - "scripts/test-firebase-hosting-live.js"
      - ".github/workflows/firebase-hosting.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-hosting-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish app.munea.net candidate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Verify public site contract and routes
        run: npm run test:hosting

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/491603544409/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: firebase-hosting-deployer@gen-lang-client-0229303523.iam.gserviceaccount.com

      - name: Deploy Firebase Hosting
        run: npx --yes firebase-tools@15.23.0 deploy --only hosting:public --project gen-lang-client-0229303523 --non-interactive

  notify-failure:
    name: Notify Slack when website publish fails
    needs: deploy
    if: failure() && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Send one Slack summary
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.MUNEA_SLACK_ALERT_WEBHOOK }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          webhook = os.environ.get("SLACK_WEBHOOK_URL", "").strip()
          if not webhook:
              raise SystemExit("MUNEA_SLACK_ALERT_WEBHOOK is not configured")
          request = urllib.request.Request(
              webhook,
              data=json.dumps({
                  "text": "[Munea Website][WARNING] Firebase Hosting publish failed.\n" + os.environ["RUN_URL"]
              }).encode("utf-8"),
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=10) as response:
              if response.status < 200 or response.status >= 300:
                  raise SystemExit(f"Slack webhook returned HTTP {response.status}")
          PY
