name: Smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-no-api:
    name: Windows smoke without API server
    runs-on: windows-latest
    timeout-minutes: 15
    outputs:
      static-smoke-outcome: ${{ steps.static-smoke.outcome }}
      supabase-doctor-outcome: ${{ steps.supabase-doctor.outcome }}
      release-consistency-outcome: ${{ steps.release-consistency.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Node dependencies
        run: npm ci

      - name: Run app-site SEO contract
        run: npm run test:seo

      - name: Install Python dependencies
        run: python -m pip install -r engine/requirements.txt

      - name: Run static smoke
        id: static-smoke
        env:
          GEMINI_API_KEY: smoke-test-key
          MUNEA_SKIP_ENV_LOCAL: "1"
        run: npm run smoke:no-api

      - name: Summarize static smoke
        if: always()
        shell: pwsh
        run: |
          if ("${{ steps.static-smoke.outcome }}" -eq "success") {
            "[ok] Static smoke passed." >> $env:GITHUB_STEP_SUMMARY
          } else {
            "[error] Static smoke failed and blocks this run." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Run Supabase doctor without secrets
        id: supabase-doctor
        if: always()
        env:
          MUNEA_SKIP_ENV_LOCAL: "1"
        run: npm run supabase:doctor

      - name: Summarize Supabase doctor
        if: always()
        shell: pwsh
        run: |
          if ("${{ steps.supabase-doctor.outcome }}" -eq "success") {
            "[ok] Supabase doctor passed without secrets." >> $env:GITHUB_STEP_SUMMARY
          } else {
            "[error] Supabase doctor failed and blocks this run." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Run release consistency gate
        id: release-consistency
        if: always()
        shell: pwsh
        run: |
          node scripts/test-release-consistency.js
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          node scripts/test-cloudrun-topology-contract.js
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python engine/test_service_metadata.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          node scripts/check-release-consistency.js

      - name: Summarize release consistency
        if: always()
        shell: pwsh
        run: |
          if ("${{ steps.release-consistency.outcome }}" -eq "success") {
            "[ok] Release consistency passed." >> $env:GITHUB_STEP_SUMMARY
          } else {
            "[error] Release consistency failed and blocks this run." >> $env:GITHUB_STEP_SUMMARY
          }

  auth-gate:
    name: Windows auth gate smoke
    runs-on: windows-latest
    timeout-minutes: 15
    outputs:
      auth-gate-outcome: ${{ steps.auth-gate-smoke.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r engine/requirements.txt

      - name: Run auth gate smoke
        id: auth-gate-smoke
        env:
          GEMINI_API_KEY: smoke-test-key
          MUNEA_SKIP_ENV_LOCAL: "1"
        run: npm run smoke:auth

      - name: Summarize auth gate smoke
        if: always()
        shell: pwsh
        run: |
          if ("${{ steps.auth-gate-smoke.outcome }}" -eq "success") {
            "[ok] Auth gate smoke passed." >> $env:GITHUB_STEP_SUMMARY
          } else {
            "[error] Auth gate smoke failed and blocks this run." >> $env:GITHUB_STEP_SUMMARY
          }

  notify-main-failure:
    name: Notify Slack when main checks need attention
    needs:
      - smoke-no-api
      - auth-gate
    if: >-
      ${{
        always() &&
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        (
          needs['smoke-no-api'].outputs['static-smoke-outcome'] != 'success' ||
          needs['smoke-no-api'].outputs['supabase-doctor-outcome'] != 'success' ||
          needs['smoke-no-api'].outputs['release-consistency-outcome'] != 'success' ||
          needs['auth-gate'].outputs['auth-gate-outcome'] != 'success'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Send one Slack summary
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.MUNEA_SLACK_ALERT_WEBHOOK }}
          STATIC_SMOKE: ${{ needs['smoke-no-api'].outputs['static-smoke-outcome'] }}
          SUPABASE_DOCTOR: ${{ needs['smoke-no-api'].outputs['supabase-doctor-outcome'] }}
          RELEASE_CONSISTENCY: ${{ needs['smoke-no-api'].outputs['release-consistency-outcome'] }}
          AUTH_GATE: ${{ needs['auth-gate'].outputs['auth-gate-outcome'] }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          webhook = os.environ.get("SLACK_WEBHOOK_URL", "").strip()
          if not webhook:
              raise SystemExit("MUNEA_SLACK_ALERT_WEBHOOK is not configured")
          message = "\n".join([
              "[Munea CI][WARNING] main 分支檢查需要處理",
              f"Smoke: {os.environ['STATIC_SMOKE']}",
              f"Supabase doctor: {os.environ['SUPABASE_DOCTOR']}",
              f"Release consistency: {os.environ['RELEASE_CONSISTENCY']}",
              f"Auth gate: {os.environ['AUTH_GATE']}",
              f"查看結果: {os.environ['RUN_URL']}",
          ])
          request = urllib.request.Request(
              webhook,
              data=json.dumps({"text": message}, ensure_ascii=False).encode("utf-8"),
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=10) as response:
              if response.status < 200 or response.status >= 300:
                  raise SystemExit(f"Slack webhook returned HTTP {response.status}")
          PY
