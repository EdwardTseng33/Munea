name: Smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-no-api:
    name: Windows smoke without API server
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r engine/requirements.txt

      - name: Run static smoke
        id: static-smoke
        continue-on-error: ${{ github.event_name == 'push' }}
        env:
          GEMINI_API_KEY: smoke-test-key
          MUNEA_SKIP_ENV_LOCAL: "1"
        run: npm run smoke:no-api

      - name: Summarize static smoke
        if: always()
        shell: pwsh
        run: |
          if ("${{ steps.static-smoke.outcome }}" -eq "success") {
            "[ok] Static smoke passed." >> $env:GITHUB_STEP_SUMMARY
          } else {
            "[warn] Static smoke reported issues. Push runs are soft-failed to avoid notification noise; pull_request and workflow_dispatch remain strict." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Run Supabase doctor without secrets
        id: supabase-doctor
        continue-on-error: ${{ github.event_name == 'push' }}
        env:
          MUNEA_SKIP_ENV_LOCAL: "1"
        run: npm run supabase:doctor

      - name: Summarize Supabase doctor
        if: always()
        shell: pwsh
        run: |
          if ("${{ steps.supabase-doctor.outcome }}" -eq "success") {
            "[ok] Supabase doctor passed without secrets." >> $env:GITHUB_STEP_SUMMARY
          } else {
            "[warn] Supabase doctor reported issues. Push runs are soft-failed to avoid notification noise; pull_request and workflow_dispatch remain strict." >> $env:GITHUB_STEP_SUMMARY
          }

  auth-gate:
    name: Windows auth gate smoke
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r engine/requirements.txt

      - name: Run auth gate smoke
        id: auth-gate-smoke
        continue-on-error: ${{ github.event_name == 'push' }}
        env:
          GEMINI_API_KEY: smoke-test-key
          MUNEA_SKIP_ENV_LOCAL: "1"
        run: npm run smoke:auth

      - name: Summarize auth gate smoke
        if: always()
        shell: pwsh
        run: |
          if ("${{ steps.auth-gate-smoke.outcome }}" -eq "success") {
            "[ok] Auth gate smoke passed." >> $env:GITHUB_STEP_SUMMARY
          } else {
            "[warn] Auth gate smoke reported issues. Push runs are soft-failed to avoid notification noise; pull_request and workflow_dispatch remain strict." >> $env:GITHUB_STEP_SUMMARY
          }
