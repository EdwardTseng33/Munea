<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"><title>V2-Family</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#F6F1E7;--ink:#2E2A24;--muted:#8B8578;--line:#EEE7DA;
--sage:#7E8B4F;--coral:#E8703A;--lav:#9B8FE8;--gold:#E6B34A;--cocoa:#6B4E3D;--sky:#5AA9C9}
.frame{width:390px;background:var(--cream);border-radius:34px;overflow:hidden;
box-shadow:0 24px 70px rgba(0,0,0,.4);font-family:'Poppins','Noto Sans TC',system-ui,sans-serif;color:var(--ink)}
.pad{padding:24px 20px 30px}
.disp{font-family:'Poppins','Noto Sans TC',sans-serif;font-weight:800;letter-spacing:-.5px;line-height:1.05}
.big{font-weight:800;letter-spacing:-1px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 11px;border-radius:999px}
.svg{width:22px;height:22px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav{display:flex;justify-content:space-around;align-items:center;padding:12px 8px 22px;background:#fff;box-shadow:0 -4px 20px -12px rgba(0,0,0,.2)}
.nav a{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:700}
.nav a.on{color:var(--coral)}
.nav .d{width:40px;height:32px;border-radius:12px;display:grid;place-items:center}
.nav a.on .d{background:#FBE6DA}
.nav .fab{width:50px;height:50px;border-radius:18px;background:var(--coral);box-shadow:0 10px 22px -6px rgba(232,112,58,.6);margin-top:-16px}
body{background:#2b2b2b;display:flex;justify-content:center;padding:24px;min-height:100vh}</style></head><body><div class="frame">
<div class="pad">
  <div class="disp" style="font-size:30px;margin-bottom:20px">全家健康圈</div>
  <div style="display:flex;gap:10px;margin-bottom:22px">
    <div style="text-align:center"><div style="width:56px;height:56px;border-radius:20px;background:var(--coral);display:grid;place-items:center;color:#fff;font-weight:800;font-size:20px">全</div><div style="font-size:12px;font-weight:800;color:var(--coral);margin-top:6px">全家</div></div>
    <div style="text-align:center"><div style="width:56px;height:56px;border-radius:20px;background:var(--gold);display:grid;place-items:center;color:#fff;font-weight:800;font-size:20px">嬤</div><div style="font-size:12px;color:var(--muted);margin-top:6px">阿嬤</div></div>
    <div style="text-align:center"><div style="width:56px;height:56px;border-radius:20px;background:var(--sage);display:grid;place-items:center;color:#fff;font-weight:800;font-size:20px">華</div><div style="font-size:12px;color:var(--muted);margin-top:6px">美華</div></div>
    <div style="text-align:center"><div style="width:56px;height:56px;border-radius:20px;background:var(--cocoa);display:grid;place-items:center;color:#fff;font-weight:800;font-size:20px">明</div><div style="font-size:12px;color:var(--muted);margin-top:6px">志明</div></div>
    <div style="text-align:center"><div style="width:56px;height:56px;border-radius:20px;background:var(--lav);display:grid;place-items:center;color:#fff;font-weight:800;font-size:20px">寶</div><div style="font-size:12px;color:var(--muted);margin-top:6px">小寶</div></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <span class="disp" style="font-size:20px">家庭活動</span>
    <span style="width:38px;height:38px;border-radius:13px;background:var(--coral);color:#fff;display:grid;place-items:center;font-size:22px">＋</span></div>
  <!-- 走路活動：沙綠大卡＋白進度環 -->
  <div style="background:var(--sage);border-radius:26px;padding:20px;color:#fff;margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-size:13px;font-weight:700;opacity:.9">🚩 本週 · 一起走路</span><span class="chip" style="background:rgba(255,255,255,.22);color:#fff">還剩 2 天</span></div>
    <div style="display:flex;align-items:center;gap:18px">
      <svg viewBox="0 0 90 90" style="width:84px;height:84px;flex:0 0 84px"><circle cx="45" cy="45" r="37" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="10"/><circle cx="45" cy="45" r="37" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-dasharray="232" stroke-dashoffset="65" transform="rotate(-90 45 45)"/><text x="45" y="51" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">72%</text></svg>
      <div><div class="big" style="font-size:30px">21,500</div><div style="font-size:13px;opacity:.85;margin-top:2px">/ 30,000 步 · 今晚一起補</div></div>
    </div>
  </div>
  <!-- 聚餐卡：白底 -->
  <div style="background:#fff;border-radius:24px;padding:18px;box-shadow:0 8px 24px -16px rgba(0,0,0,.3)">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;font-weight:800;color:var(--coral)">🍽 揪一攤 · 週六</span><span style="font-size:12px;color:var(--muted)">7/11 傍晚</span></div>
    <div class="disp" style="font-size:18px;margin-bottom:12px">阿嬤生日聚餐 · 老王海鮮</div>
    <div style="display:flex;gap:8px"><span class="chip" style="background:#EDF0E2;color:var(--sage)">✓ 阿嬤</span><span class="chip" style="background:#EDF0E2;color:var(--sage)">✓ 美華</span><span class="chip" style="background:var(--cream);color:var(--muted)">? 小寶</span></div>
  </div>
</div>

<div class="nav"><a><span class="d"><svg class="svg" viewBox="0 0 24 24"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/></svg></span>首頁</a>
<a><span class="d"><svg class="svg" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></span>狀態</a>
<a><span class="fab" style="display:grid;place-items:center"><svg class="svg" style="stroke:#fff" viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg></span><span style="margin-top:2px">聊聊</span></a>
<a class="on"><span class="d"><svg class="svg" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8"/></svg></span>家人</a>
<a><span class="d"><svg class="svg" viewBox="0 0 24 24"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg></span>設定</a></div>
</div></body></html>
