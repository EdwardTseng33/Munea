<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"><title>V3-Family</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1E2A26;--card:#26332E;--card2:#2C3B35;--line:#37463F;
--ink:#F4EFE6;--muted:#9DB0A6;--mint:#4FD1B5;--amber:#E9B44C;--coral:#E8825A;--violet:#B3A6F0}
.frame{width:390px;background:var(--bg);border-radius:34px;overflow:hidden;
box-shadow:0 24px 70px rgba(0,0,0,.55);font-family:'Inter','Noto Sans TC',system-ui,sans-serif;color:var(--ink)}
.pad{padding:24px 20px 30px}
.big{font-weight:800;letter-spacing:-1.5px;font-family:'Inter','Noto Sans TC',sans-serif}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 11px;border-radius:999px}
.svg{width:22px;height:22px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav{display:flex;justify-content:space-around;align-items:center;padding:12px 8px 22px;background:#18211D;border-top:1px solid var(--line)}
.nav a{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:700}
.nav a.on{color:var(--mint)}
.nav .fab{width:50px;height:50px;border-radius:18px;background:var(--mint);box-shadow:0 0 24px -2px rgba(79,209,181,.7);margin-top:-16px}
body{background:#111;display:flex;justify-content:center;padding:24px;min-height:100vh}</style></head><body><div class="frame">
<div class="pad">
  <div class="big" style="font-size:30px;margin-bottom:20px">全家健康圈</div>
  <div style="display:flex;gap:12px;margin-bottom:22px">
    <div style="text-align:center"><div style="width:54px;height:54px;border-radius:50%;background:var(--card2);border:2px solid var(--mint);display:grid;place-items:center;color:var(--mint);box-shadow:0 0 16px -4px rgba(79,209,181,.6)"><svg class="svg" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8"/></svg></div><div style="font-size:12px;font-weight:800;color:var(--mint);margin-top:6px">全家</div></div>
    <div style="text-align:center"><div style="width:54px;height:54px;border-radius:50%;background:#E8825A;display:grid;place-items:center;color:#12211C;font-weight:800;font-size:19px">嬤</div><div style="font-size:12px;color:var(--muted);margin-top:6px">阿嬤</div></div>
    <div style="text-align:center"><div style="width:54px;height:54px;border-radius:50%;background:#4FD1B5;display:grid;place-items:center;color:#12211C;font-weight:800;font-size:19px">華</div><div style="font-size:12px;color:var(--muted);margin-top:6px">美華</div></div>
    <div style="text-align:center"><div style="width:54px;height:54px;border-radius:50%;background:#E9B44C;display:grid;place-items:center;color:#12211C;font-weight:800;font-size:19px">明</div><div style="font-size:12px;color:var(--muted);margin-top:6px">志明</div></div>
    <div style="text-align:center"><div style="width:54px;height:54px;border-radius:50%;background:#B3A6F0;display:grid;place-items:center;color:#12211C;font-weight:800;font-size:19px">寶</div><div style="font-size:12px;color:var(--muted);margin-top:6px">小寶</div></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <span style="font-size:18px;font-weight:800">家庭活動</span>
    <span style="width:38px;height:38px;border-radius:13px;background:var(--mint);color:#12211C;display:grid;place-items:center;font-size:22px;box-shadow:0 0 18px -6px rgba(79,209,181,.6)">＋</span></div>
  <!-- 走路活動：發光環 -->
  <div style="background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-size:13px;font-weight:700;color:var(--muted)">🚩 本週 · 一起走路</span><span class="chip" style="background:rgba(233,180,76,.16);color:var(--amber)">還剩 2 天</span></div>
    <div style="display:flex;align-items:center;gap:18px">
      <svg viewBox="0 0 90 90" style="width:86px;height:86px;flex:0 0 86px"><circle cx="45" cy="45" r="37" fill="none" stroke="#37463F" stroke-width="9"/><circle cx="45" cy="45" r="37" fill="none" stroke="var(--mint)" stroke-width="9" stroke-linecap="round" stroke-dasharray="232" stroke-dashoffset="65" transform="rotate(-90 45 45)" style="filter:drop-shadow(0 0 6px rgba(79,209,181,.7))"/><text x="45" y="51" text-anchor="middle" font-size="22" font-weight="800" fill="var(--mint)">72%</text></svg>
      <div><div class="big" style="font-size:28px;color:var(--ink)">21,500</div><div style="font-size:13px;color:var(--muted);margin-top:2px">/ 30,000 步 · 今晚一起補</div>
        <div style="display:flex;gap:6px;margin-top:10px"><span class="chip" style="background:var(--card2);color:var(--muted)">嬤 3,850</span><span class="chip" style="background:var(--card2);color:var(--muted)">華 8,900</span></div></div>
    </div>
  </div>
  <!-- 聚餐 -->
  <div style="background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;font-weight:800;color:var(--amber)">🍽 揪一攤 · 週六</span><span style="font-size:12px;color:var(--muted)">7/11 傍晚</span></div>
    <div class="big" style="font-size:18px;margin-bottom:12px">阿嬤生日聚餐 · 老王海鮮</div>
    <div style="display:flex;gap:8px"><span class="chip" style="background:rgba(79,209,181,.16);color:var(--mint)">✓ 阿嬤</span><span class="chip" style="background:rgba(79,209,181,.16);color:var(--mint)">✓ 美華</span><span class="chip" style="background:var(--card2);color:var(--muted)">? 小寶</span></div>
  </div>
</div>

<div class="nav"><a><svg class="svg" viewBox="0 0 24 24"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/></svg>首頁</a>
<a><svg class="svg" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>狀態</a>
<a><span class="fab" style="display:grid;place-items:center"><svg class="svg" style="stroke:#12211C" viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg></span><span style="margin-top:2px">聊聊</span></a>
<a class="on"><svg class="svg" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8"/></svg>家人</a>
<a><svg class="svg" viewBox="0 0 24 24"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg>設定</a></div>
</div></body></html>
